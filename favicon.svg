<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- A soft light gradient background for the favicon tile -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
    <!-- Refined blue accent gradient for the monogram -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
  </defs>
  <!-- Floating background tile with rounded corners and subtle border/depth -->
  <rect width="32" height="32" rx="9" fill="url(#bgGrad)" />
  <rect x="0.5" y="0.5" width="31" height="31" rx="8.5" fill="none" stroke="#e2e8f0" stroke-width="1" />
  
  <!-- Subtle circular accent line in background -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="url(#logoGrad)" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.12" />
  
  <!-- Continuous geometric CS monoline logo -->
  <path d="M13 11.5 H11 C10 11.5 9 12.5 9 13.5 V18.5 C9 19.5 10 20.5 11 20.5 H14 C15 20.5 16 19.5 16 18.5 V13.5 C16 12.5 17 11.5 18 11.5 H21 C22 11.5 23 12.5 23 13.5 V18.5 C23 19.5 22 20.5 21 20.5 H19" 
        fill="none" 
        stroke="url(#logoGrad)" 
        stroke-width="3" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
</svg>
